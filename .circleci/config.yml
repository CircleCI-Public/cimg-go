version: 2.1

orbs:
  cimg: circleci/cimg@0.6.5
  slack: circleci/slack@4.13.3

parameters:
  cron:
    type: boolean
    default: false

workflows:
  automated-wf:
    when: << pipeline.parameters.cron >>
    jobs:
      - cimg/update:
          update-script: goFeed.sh
          context:
            - slack-notification-access-token
            - slack-cimg-notifications
            - cpe-image-bot-github-creds
  main-wf:
    when:
      not: << pipeline.parameters.cron >>
    jobs:
      - do-nothing
jobs:
  do-nothing:
    machine:
      image: ubuntu-2204:2024.04.4
    resource_class: xlarge
    steps:
      - checkout
      - run: sudo apt-get update && sudo apt-get install -y qemu-user-static binfmt-support
      - run: sleep 500
